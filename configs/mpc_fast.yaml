project:
  name: agroeye-decision-maker
  seed: 42
  timezone: UTC
paths:
  data_root: ./Dataset
  artifacts_dir: ./artifacts
  reports_dir: ./reports
  logs_dir: ./artifacts/logs
data:
  teams:
  - AICU
  - Automatoes
  - Digilog
  - IUACAAS
  - Reference
  - TheAutomators
  include_weather: true
  base_freq_minutes: 10
  resample_rule: 10min
  downsample_step: 3
  outlier:
    enabled: true
    method: iqr
    iqr_k: 3.0
    robust_z_thresh: 5.0
  smoothing:
    enabled: true
    alpha: 0.35
features:
  window_hours: 24
  lags_steps:
  - 1
  - 3
  - 6
  - 12
  - 24
  rolling_steps:
  - 3
  - 6
  - 12
  - 24
  add_slope: false
  add_diurnal: true
  add_degree_hours: true
  add_resource_counters: true
training:
  controller_mode: mpc
  test_fraction: 0.15
  val_fraction: 0.15
  min_train_rows: 2000
  max_train_rows: 15000
  max_eval_rows: 1000
imitation:
  model_type: ridge
  max_depth: 8
  learning_rate: 0.05
  max_iter: 120
predictors:
  model_type: ridge
  max_depth: 8
  learning_rate: 0.05
  max_iter: 120
  targets:
  - air_temperature
  - air_humidity
  - soil_humidity
  - co2_ppm
  - yield_quality_score
  - water_use_proxy
  - energy_proxy
mpc:
  horizon_steps: 3
  n_candidates: 8
  optimizer: random_shooting
  lambda_water: 0.25
  lambda_energy: 0.3
  lambda_safety: 5.0
  temp_target_c: 22.0
  rh_target_pct: 75.0
  action_bounds:
    target_c:
    - 16.0
    - 30.0
    irrigation_duration_s:
    - 0
    - 90
    irrigation_flow_lph:
    - 20
    - 180
    fan_speed_pct:
    - 0
    - 100
    vent_open_pct:
    - 0
    - 100
    humidity_target_rh_pct:
    - 50
    - 90
inference:
  confidence:
    ood_zscore_threshold: 4.0
  anomaly:
    jump_sigma: 5.0
    flatline_steps: 6
  missing:
    carry_forward_max_steps: 12
  latency_target_ms: 200
logging:
  csv_metrics_path: ./artifacts/logs/metrics.csv
